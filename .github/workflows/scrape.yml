name: Scrape

on:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npx playwright install chromium --with-deps

      - run: npm run scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - run: npm run build

      - name: Commit updated data
        run: |
          git config user.name "codeplans-bot"
          git config user.email "bot@codeplans.dev"
          git add data/ site/data.js
          git diff --staged --quiet || git commit -m "chore: update plan data $(date -u +%Y-%m-%d)"
          git push
